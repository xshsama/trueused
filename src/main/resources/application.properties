spring.application.name=trueused
server.port=${SERVER_PORT:8081}

# JWT settings
security.jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me}
# 过期时间（毫秒），默认一天
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# MySQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/trueused?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:trueused}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:trueused}
# 修正拼写：hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway 基础配置（先接管，后完善 V1 脚本）
# 恢复 Flyway 以执行迁移（已升级 Flyway 版本并引入 MySQL 模块）
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true
# 现有库直接接管：首次迁移时基线为 1（后续补充 V1__init.sql 可再关闭）
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=Initial baseline


# Redis settings
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.database=${SPRING_REDIS_DATABASE:0}

# Cloudinary settings
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:demo}
cloudinary.api_key=${CLOUDINARY_API_KEY:demo}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:demo}

# Alipay settings
alipay.app-id=${ALIPAY_APP_ID:demo}
alipay.private-key=${ALIPAY_PRIVATE_KEY:demo}
alipay.public-key=${ALIPAY_PUBLIC_KEY:demo}
alipay.gateway-url=${ALIPAY_GATEWAY_URL:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
alipay.notify-url=${ALIPAY_NOTIFY_URL:http://localhost:8081/api/alipay/notify}
alipay.return-url=${ALIPAY_RETURN_URL:http://localhost:5173/payment/success}
server.error.include-message=always

# 测试数据开关（默认关闭，按需开启）
app.test-data.enabled=${APP_TEST_DATA_ENABLED:false}

# Observability
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_SHOW_DETAILS:when_authorized}
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
